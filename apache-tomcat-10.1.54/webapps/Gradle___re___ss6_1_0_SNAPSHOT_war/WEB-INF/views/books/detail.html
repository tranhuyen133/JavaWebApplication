<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/main}">
<head>
  <title>Chi tiết sách</title>
</head>
<body>
<div layout:fragment="content">
  <div th:if="${book != null}" class="detail-box">
    <p><strong>Mã sách:</strong> <span th:text="${book.id}"></span></p>
    <p><strong>Tên sách:</strong> <span th:text="${book.name}"></span></p>
    <p><strong>Tác giả:</strong> <span th:text="${book.author}"></span></p>
    <p>
      <strong>Giá bán:</strong>
      <span th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
    </p>
  </div>

  <p th:if="${book == null}" class="not-found">
    Không tìm thấy sách.
  </p>

  <a th:href="@{/books}" class="back-link">← Quay lại danh sách</a>
</div>
</body>
</html>
